name: Deploy Accio

on:
  push:
    branches:
      - main

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  deploy-front:
    name: Build Angular + Upload MinIO

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build Front
        run: |
          npx nx run front:build --configuration=production

      - name: Minio Deploy
        uses: mamal72/minio-perfect-deploy-action@main
        with:
          endpoint: ${{ secrets.MINIO_ENDPOINT }}
          access_key: ${{ secrets.MINIO_ACCESS_KEY }}
          secret_key: ${{ secrets.MINIO_SECRET_KEY }}
          bucket: 'accio-front' # O bucket de destino
          source_dir: 'dist/front/browser' # A pasta gerada pelo build do Angular
          target_dir: '/' # Sobe direto para a raiz do bucket

  build-api:
    name: Build Nest

    needs: deploy-front

    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/accio-api:latest

  build-ticker:
    name: Build Python

    needs: deploy-front

    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - uses: docker/build-push-action@v6
        with:
          context: ./api-ticker
          file: ./api-ticker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/accio-ticker:latest

  deploy:
    name: Update Server

    needs:
      - build-api
      - build-ticker

    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH

        uses: appleboy/ssh-action@v1

        with:
          host: ${{ secrets.SERVER_HOST }}

          username: ${{ secrets.SERVER_USER }}

          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |

            cd /programacao/applications

            docker login ghcr.io \
              -u ${{ github.actor }} \
              -p ${{ secrets.GHCR_PAT }}

            docker compose -f docker-compose.yml pull

            docker compose -f docker-compose.yml up -d
