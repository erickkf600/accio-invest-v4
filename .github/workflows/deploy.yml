name: Deploy Accio

on:
  push:
    branches:
      - main

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  deploy-front:
    name: Build Angular + Upload MinIO

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build Front
        run: |
          npx nx run front:build --configuration=production

      - name: Install MinIO CLI
        run: |
          curl -O https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod +x mc
          sudo mv mc /usr/local/bin/

      - name: Configure MinIO
        run: |
          mc alias set accio \
          https://${{ secrets.MINIO_ENDPOINT }} \
          ${{ secrets.MINIO_ACCESS_KEY }} \
          ${{ secrets.MINIO_SECRET_KEY }}

      - name: Upload Front
        run: |
          mc mirror \
            --remove \
            dist/front/browser \
            accio/accio-front

  build-api:
    name: Build Nest

    needs: deploy-front

    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/accio-api:latest

  build-ticker:
    name: Build Python

    needs: deploy-front

    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - uses: docker/build-push-action@v6
        with:
          context: ./api-ticker
          file: ./api-ticker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/accio-ticker:latest

  deploy:
    name: Update Server

    needs:
      - build-api
      - build-ticker

    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH

        uses: appleboy/ssh-action@v1

        with:
          host: ${{ secrets.SERVER_HOST }}

          username: ${{ secrets.SERVER_USER }}

          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |

            cd /programacao/applications

            docker login ghcr.io \
              -u ${{ github.actor }} \
              -p ${{ secrets.GHCR_PAT }}

            docker compose -f docker-compose.yml pull

            docker compose -f docker-compose.yml up -d
