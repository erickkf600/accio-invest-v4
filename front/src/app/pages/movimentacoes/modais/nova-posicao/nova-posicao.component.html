<div class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
  <div class="w-full max-w-[600px] bg-[#1e222b] border border-[#2a2f3a] rounded-xl shadow-2xl overflow-hidden">

    <div class="flex items-center justify-between px-6 pt-5 pb-3">
      <h2 class="text-xl font-semibold text-white">{{ isEditing() ? 'Editar Posição' : 'Nova Posição' }}</h2>
      <button (click)="onClose()" class="text-slate-400 hover:text-white transition-colors cursor-pointer">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <form (submit)="onSubmit(); $event.preventDefault()" class="p-6 space-y-4">

      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-2 flex flex-col mb-4">
          <label class="text-[10px] font-bold tracking-wider text-slate-400 uppercase">Cód. Ativo</label>
          <input
            type="text"
            placeholder="EX: PETR4"
            list="tickers"
            [formField]="novaPosicaoForm.ticker"
            class="w-full bg-[#2c313c]/60 border border-[#2c313c] focus:border-emerald-500 rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-500 outline-none uppercase transition-colors"
          />
          <datalist id="tickers">
            @for (t of tickerDatalist; track t) {
              <option [value]="t">{{ t }}</option>
            }
          </datalist>
        </div>

        <div class="space-y-2 flex flex-col mb-4">
          <label class="text-[10px] font-bold tracking-wider text-slate-400 uppercase">Data da Operação</label>
          <div class="relative flex items-center">
            <input
              type="text"
              placeholder="DD/MM/AAAA"
              appDateMask
              [formField]="novaPosicaoForm.dataOperacao"
              class="w-full bg-[#2c313c]/60 border border-[#2c313c] focus:border-emerald-500 rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-500 outline-none transition-colors"
            />
            <span class="absolute right-4 pointer-events-none text-slate-400">
              <span class="material-symbols-outlined text-[20px]">calendar_today</span>
            </span>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-2 flex flex-col mb-4">
          <label class="text-[10px] font-bold tracking-wider text-slate-400 uppercase">Tipo</label>
          <div class="relative">
            <select
              [formField]="novaPosicaoForm.tipo"
              class="w-full appearance-none bg-[#2c313c]/60 border border-[#2c313c] rounded-lg px-4 py-2.5 text-sm text-white outline-none cursor-pointer pr-10"
            >
              <option value="" disabled selected hidden>Selecione o tipo</option>
              <option value="Desdobramento">Desdobramento</option>
              <option value="Grupamento">Grupamento</option>
              <option value="Bonificação">Bonificação</option>
            </select>
            <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
              </svg>
            </div>
          </div>
        </div>

        <div class="space-y-2 flex flex-col mb-4">
          <label class="text-[10px] font-bold tracking-wider text-slate-400 uppercase">Fator</label>
          <div class="relative">
            <select
              [formField]="novaPosicaoForm.fator"
              class="w-full appearance-none bg-[#2c313c]/60 border border-[#2c313c] rounded-lg px-4 py-2.5 text-sm text-white outline-none cursor-pointer pr-10"
            >
              <option value="" disabled selected hidden>Selecione o fator</option>
              <option value="Desdobramento">Desdobramento</option>
              <option value="Grupamento">Grupamento</option>
            </select>
            <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
              </svg>
            </div>
          </div>
        </div>
      </div>

      <div class="space-y-2 flex flex-col mb-4">
        <label class="text-[10px] font-bold tracking-wider text-slate-400 uppercase">Proporção (Ratio)</label>
        <div class="flex items-center gap-3">
          <div class="flex-1">
            <input type="text" placeholder="De" [formField]="novaPosicaoForm.ratioDe" class="w-full bg-[#2c313c]/60 border border-[#2c313c] focus:border-emerald-500 rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-500 outline-none transition-colors" />
          </div>
          <span class="material-symbols-outlined text-primary-success text-lg">arrow_right_alt</span>
          <div class="flex-1">
            <input type="text" placeholder="Para" [formField]="novaPosicaoForm.ratioPara" class="w-full bg-[#2c313c]/60 border border-[#2c313c] focus:border-emerald-500 rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-500 outline-none transition-colors" />
          </div>
        </div>
      </div>

      <div class="space-y-2 flex flex-col mb-4">
        <label class="text-[10px] font-bold tracking-wider text-slate-400 uppercase">Observações</label>
        <textarea rows="3" placeholder="Descreva os detalhes da alteração societária..." [formField]="novaPosicaoForm.observacoes" class="w-full bg-[#2c313c]/60 border border-[#2c313c] focus:border-emerald-500 rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-500 outline-none resize-none transition-colors"></textarea>
      </div>

      <div class="pt-4">
        <button type="submit" [disabled]="novaPosicaoForm().invalid()" class="w-full bg-[#72d339] hover:bg-[#62b930] text-[#11161d] font-bold py-3 px-4 rounded-xl text-sm transition-all shadow-lg shadow-emerald-950/10 cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed">
          {{ isEditing() ? 'Atualizar Posição' : 'Adicionar Alteração' }}
        </button>
      </div>

    </form>
  </div>
</div>
