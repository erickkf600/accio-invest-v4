<div class="glass-card rounded-xl min-h-[400px] flex flex-col items-center justify-center text-center p-8">
  <div class="mb-8">
    <div class="relative w-36 h-36 mx-auto flex items-center justify-center">
      <div class="absolute inset-0 bg-primary-success/5 rounded-full blur-3xl"></div>
      <div class="relative bg-white/5 p-6 rounded-full border border-white/10">
        <span class="material-symbols-outlined text-primary-success/40" style="font-variation-settings: 'wght' 200;" style='font-size: 40px'>swap_horiz</span>
      </div>
    </div>
  </div>
  <div class="max-w-md">
    <h2 class="text-2xl font-bold text-text-light mb-3">Nenhuma movimentação encontrada</h2>
    <p class="text-text-muted mb-8 leading-relaxed">
      Comece a registrar seus aportes para visualizar seu histórico financeiro aqui.
    </p>
    <div>
      <button
        type="button"
        class="inline-flex items-center gap-2 bg-primary-success text-bg-main px-8 py-3 rounded-xl font-bold hover:opacity-90 hover:-translate-y-1 transition-all cursor-pointer"
        (click)="emptyMenu.toggle()"
      >
        <span class="material-symbols-outlined">add</span>
        Fazer Primeiro Aporte
      </button>
      <app-menu #emptyMenu>
        <div class="flex flex-col">
          <button
            class="flex items-center gap-3 px-4 py-3 text-sm text-[#e1e2eb] hover:bg-white/5 hover:text-primary transition-all text-left w-full"
            (click)="onOperationTypeChange('1'); emptyMenu.close()"
          >
            <span class="material-symbols-outlined text-[20px] text-primary">shopping_cart</span>
            <span class="font-semibold">Nova compra</span>
          </button>
          <button
            class="flex items-center gap-3 px-4 py-3 text-sm text-[#e1e2eb] hover:bg-white/5 hover:text-primary transition-all text-left w-full"
            (click)="onOperationTypeChange('3'); emptyMenu.close()"
          >
            <span class="material-symbols-outlined text-[20px] text-[#f59e0b]">account_balance</span>
            <span class="font-semibold">Renda fixa</span>
          </button>
        </div>
      </app-menu>
    </div>
  </div>
</div>
