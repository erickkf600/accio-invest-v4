<div class="flex items-center gap-1.5 bg-white/[0.02] border border-white/5 p-1 rounded-xl w-fit overflow-x-auto scrollbar-hide">
  @for (tab of options(); track tab.id) {
    <button
      type="button"
      (click)="selectTab(tab.id)"
      class="flex items-center gap-2 px-4 py-2 rounded-lg text-xs font-bold transition-all duration-200 cursor-pointer whitespace-nowrap"
      [class.bg-[#75d33b]]="activeTab() === tab.id"
      [class.text-[#0b0e14]]="activeTab() === tab.id"
      [class.shadow-md]="activeTab() === tab.id"
      [class.text-text-muted]="activeTab() !== tab.id"
      [class.hover:text-text-light]="activeTab() !== tab.id"
      [class.hover:bg-white/5]="activeTab() !== tab.id"
    >
      @if (tab.icon) {
        <span class="material-symbols-outlined text-[16px]">{{ tab.icon }}</span>
      }
      {{ tab.label }}
    </button>
  }
</div>
