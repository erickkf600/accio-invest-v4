@for (pos of positions; track pos) {
  @if (toastsByPosition()[pos].length > 0) {
    <div class="fixed z-50 flex flex-col gap-2 pointer-events-none" [class]="positionClass(pos)">
      @for (toast of toastsByPosition()[pos]; track toast.id) {
        <div
          class="pointer-events-auto bg-[#0b0e14]/80 backdrop-blur-xl border p-4 rounded-xl flex items-center gap-4 max-w-sm shadow-2xl transition-all duration-300"
          [class]="borderClass(toast.type)"
        >
          <div
            class="w-8 h-8 rounded-full flex items-center justify-center shrink-0"
            [class]="iconContainerClass(toast.type)"
          >
            <span class="material-symbols-outlined text-[20px]">{{ iconName(toast.type) }}</span>
          </div>
          <div class="flex-1 min-w-0">
            @if (toast.title) {
              <p class="text-body-md font-bold text-[#e1e2eb] leading-tight">{{ toast.title }}</p>
            }
            <p class="text-[12px] text-[#bfcab3]">{{ toast.message }}</p>
          </div>
          @if (toast.closable) {
            <button
              class="material-symbols-outlined text-[#bfcab3] hover:text-[#e1e2eb] text-[18px] shrink-0 transition-colors"
              (click)="toastService.remove(toast.id)"
            >
              close
            </button>
          }
        </div>
      }
    </div>
  }
}
