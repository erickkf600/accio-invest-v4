<div class="relative">
  <input
    #inputEl
    cdkOverlayOrigin
    #origin="cdkOverlayOrigin"
    type="text"
    autocomplete="off"
    [formField]="formField()"
    (input)="onInput()"
    (focus)="onFocus()"
    (blur)="onBlur()"
    [placeholder]="placeholder()"
    [class]="'w-full bg-[#2c313c]/60 border border-[#2c313c] focus:border-emerald-500 rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-500 outline-none transition-colors '+inputClass()"
    [class.border-red-400]="invalidOption()"
  />

  <ng-template
    cdkConnectedOverlay
    [cdkConnectedOverlayOrigin]="origin"
    [cdkConnectedOverlayOpen]="isOpen() && filteredOptions().length > 0"
    (detach)="isOpen.set(false)"
    (backdropClick)="isOpen.set(false)"
    [cdkConnectedOverlayWidth]="triggerWidth"
  >
    <ul class="max-h-48 overflow-y-auto bg-[#1e222b] border border-[#2c313c] rounded-lg shadow-xl w-full">
      @for (opt of filteredOptions(); track opt) {
        <li
          (mousedown)="selectOption(opt)"
          class="px-4 py-2 text-sm text-slate-200 hover:bg-emerald-500/10 hover:text-emerald-400 cursor-pointer transition-colors"
        >
          {{ opt }}
        </li>
      }
    </ul>
  </ng-template>

  @if (invalidOption()) {
    <span class="text-xs text-red-400 mt-1 block">Item inválido</span>
  }
</div>
