<button
  type="button"
  cdkOverlayOrigin
  #origin="cdkOverlayOrigin"
  (click)="toggle()"
  class="flex items-center gap-2 bg-[#121620] border border-white/10 rounded-lg py-2.5 px-4 text-text-light text-sm hover:border-primary-success transition-all cursor-pointer font-medium"
>
  <span class="material-symbols-outlined text-[20px] text-text-muted">calendar_today</span>
  @if (model().startDate && model().endDate) {
    <span>{{ model().startDate }} - {{ model().endDate }}</span>
  } @else {
    <span>Selecionar período</span>
  }
</button>

<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayOrigin]="origin"
  [cdkConnectedOverlayOpen]="isOpen()"
  [cdkConnectedOverlayHasBackdrop]="true"
  [cdkConnectedOverlayBackdropClass]="'cdk-overlay-transparent-backdrop'"
  [cdkConnectedOverlayPositions]="[{ originX: 'end', overlayX: 'end', originY: 'top', overlayY: 'top', offsetY: 55 }]"
  (backdropClick)="isOpen.set(false)"
  (detach)="isOpen.set(false)"
>
  <div class="w-72 bg-[#121620] border border-white/10 rounded-xl p-4 shadow-2xl space-y-4">
    <div class="flex items-center justify-between flex-wrap gap-2">
      <h4 class="text-xs font-bold text-text-light uppercase tracking-wider">Período de Busca</h4>
      <button
        type="button"
        (click)="setMonthRange()"
        class="text-xs font-semibold text-primary-success hover:underline transition-all cursor-pointer"
      >
        Este mês
      </button>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-[10px] font-semibold text-text-muted mb-1">Início</label>
        <input
          type="text"
          [placeholder]="mode() === 'monthYear' ? 'MM/AAAA' : 'DD/MM/AAAA'"
          [appDateMask]="mode() === 'monthYear' ? 'monthYear' : true"
          [formField]="dateForm.startDate"
          class="w-full bg-[#0b0e14] border border-white/10 rounded-lg py-2 px-2.5 text-text-light text-xs focus:border-primary-success focus:ring-1 focus:ring-primary-success outline-none transition-all"
        />
      </div>
      <div>
        <label class="block text-[10px] font-semibold text-text-muted mb-1">Fim</label>
        <input
          type="text"
          [placeholder]="mode() === 'monthYear' ? 'MM/AAAA' : 'DD/MM/AAAA'"
          [appDateMask]="mode() === 'monthYear' ? 'monthYear' : true"
          [formField]="dateForm.endDate"
          class="w-full bg-[#0b0e14] border border-white/10 rounded-lg py-2 px-2.5 text-text-light text-xs focus:border-primary-success focus:ring-1 focus:ring-primary-success outline-none transition-all"
        />
      </div>
    </div>

    @if (dateError()) {
      <p class="text-[11px] text-red-400 text-center">{{ dateError() }}</p>
    }

    <div class="flex gap-2 pt-2">
      <button
        type="button"
        (click)="close()"
        class="flex-1 py-1.5 rounded-lg border border-white/10 text-text-muted text-xs font-semibold hover:bg-white/5 hover:text-text-light transition-all cursor-pointer"
      >
        Cancelar
      </button>
      <button
        type="button"
        (click)="confirm()"
        [disabled]="!model().startDate || !model().endDate || !!dateError()"
        class="flex-1 py-1.5 bg-[#75d33b] text-[#0b0e14] text-xs font-bold rounded-lg hover:opacity-90 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed transition-all cursor-pointer"
      >
        Confirmar
      </button>
    </div>
  </div>
</ng-template>
