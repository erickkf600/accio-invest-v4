<form (submit)="onSubmit(); $event.preventDefault()" class="glass-card p-6 rounded-2xl grid grid-cols-1 md:grid-cols-4 lg:grid-cols-12 gap-4 items-end">
  <div class="lg:col-span-4">
    <label class="block text-xs font-semibold text-text-muted mb-2">Buscar ativo</label>
    <div class="relative">
      <span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-text-muted text-[20px]">search</span>
      <input
        class="w-full bg-bg-main border border-white/10 rounded-lg py-2.5 pl-10 pr-4 text-text-light text-sm focus:border-primary-success focus:ring-1 focus:ring-primary-success outline-none transition-all"
        placeholder="Ex: AAPL, PETR4..."
        type="text"
        [formField]="filterForm.searchTerm"
      />
    </div>
  </div>
  <div class="lg:col-span-3">
    <label class="block text-xs font-semibold text-text-muted mb-2">Tipo de operação</label>
    <div class="relative">
      <select
        class="w-full bg-bg-main border border-white/10 rounded-lg py-2.5 px-4 text-text-light text-sm focus:border-primary-success focus:ring-1 focus:ring-primary-success outline-none cursor-pointer appearance-none"
        [formField]="filterForm.selectedType"
      >
        <option value="Todos">Todos</option>
        <option value="Compra">Compra</option>
        <option value="Venda">Venda</option>
        <option value="Proventos">Proventos</option>
        <option value="Renda Fixa">Renda Fixa</option>
        <option value="Reposicionamento">Reposicionamento</option>
      </select>
      <span class="absolute right-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-text-muted pointer-events-none text-[20px]">keyboard_arrow_down</span>
    </div>
  </div>
  <div class="lg:col-span-3">
    <label class="block text-xs font-semibold text-text-muted mb-2">Período</label>
    <div class="relative">
      <input
        class="w-full bg-bg-main border border-white/10 rounded-lg py-2.5 px-4 text-text-light text-sm focus:border-primary-success focus:ring-1 focus:ring-primary-success outline-none transition-all"
        placeholder="Últimos 30 dias"
        type="text"
        disabled
      />
      <span class="absolute right-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-text-muted pointer-events-none text-[20px]">calendar_today</span>
    </div>
  </div>
  <div class="lg:col-span-2">
    <div class="flex gap-2">
      <button type="submit" class="flex-1 h-[46px] rounded-lg border border-primary-success/30 text-primary-success font-bold hover:bg-primary-success/10 transition-all flex items-center justify-center gap-2 cursor-pointer text-sm">
        <span class="material-symbols-outlined text-[20px]">filter_list</span>
        Filtrar
      </button>
      <button type="button" (click)="onClear()" [disabled]="!canClear()" class="w-[46px] h-[46px] shrink-0 rounded-lg border border-white/10 text-text-muted hover:text-text-light hover:bg-white/5 transition-all flex items-center justify-center cursor-pointer disabled:cursor-not-allowed disabled:opacity-50" title="Limpar Filtros">
        <span class="material-symbols-outlined text-[20px]">filter_alt_off</span>
      </button>
    </div>
  </div>
</form>
